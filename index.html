<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="減脂追蹤"/>
<meta name="theme-color" content="#ffffff"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<title>個人減脂追蹤器</title>
<style>
:root{
  --bg:#f5f5f3;--card:#ffffff;--border:#e5e4de;--text:#0b0b0b;
  --muted:#898781;--secondary:#52514e;--accent:#2a78d6;
  --green:#1baf7a;--red:#e34948;--amber:#eda100;
  --radius:10px;--safe-top:env(safe-area-inset-top);
  --safe-bot:env(safe-area-inset-bottom);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#111110;--card:#1c1c1a;--border:#2c2c2a;--text:#ffffff;
  --muted:#636360;--secondary:#a0a09c;}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;
  background:var(--bg);color:var(--text);min-height:100dvh;
  padding-top:calc(var(--safe-top) + 56px);padding-bottom:calc(var(--safe-bot) + 16px)}
.header{position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(255,255,255,0.85);backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);border-bottom:0.5px solid var(--border);
  padding:calc(var(--safe-top) + 8px) 16px 8px}
@media(prefers-color-scheme:dark){.header{background:rgba(17,17,16,0.85)}}
.header h1{font-size:17px;font-weight:600;letter-spacing:-0.3px}
.header p{font-size:12px;color:var(--muted);margin-top:1px}
.tab-bar{display:flex;gap:0;border-bottom:0.5px solid var(--border);
  background:var(--card);position:sticky;top:calc(var(--safe-top)+56px);z-index:50}
.tab-btn{flex:1;padding:10px 4px;font-size:12px;font-weight:500;
  color:var(--muted);border:none;background:transparent;cursor:pointer;
  border-bottom:2px solid transparent;transition:all .15s}
.tab-btn.on{color:var(--accent);border-bottom-color:var(--accent)}
.page{display:none;padding:16px}
.page.on{display:block}
.card{background:var(--card);border-radius:var(--radius);
  border:0.5px solid var(--border);padding:14px 16px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:600;color:var(--secondary);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.kpi{background:var(--card);border-radius:var(--radius);
  border:0.5px solid var(--border);padding:12px 14px}
.kpi-lbl{font-size:11px;color:var(--muted);margin-bottom:4px}
.kpi-val{font-size:22px;font-weight:600;letter-spacing:-0.5px}
.kpi-val.g{color:var(--green)}.kpi-val.r{color:var(--red)}
.form-group{margin-bottom:12px}
.form-group label{font-size:12px;color:var(--secondary);display:block;margin-bottom:5px}
.form-group input,.form-group select{
  width:100%;padding:10px 12px;font-size:16px;border-radius:var(--radius);
  border:0.5px solid var(--border);background:var(--bg);color:var(--text);
  appearance:none;-webkit-appearance:none}
.form-group input:focus,.form-group select:focus{outline:none;border-color:var(--accent)}
.hint-text{font-size:11px;color:var(--muted);margin-top:5px}
.tdee-preview{font-size:13px;color:var(--accent);margin-top:6px;min-height:18px}
.btn{width:100%;padding:13px;border-radius:var(--radius);border:none;
  font-size:16px;font-weight:600;cursor:pointer;margin-bottom:8px}
.btn-primary{background:var(--accent);color:#fff}
.btn-google{background:#fff;color:#444;border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;gap:8px}
.btn-danger{background:transparent;color:var(--red);border:0.5px solid var(--red)}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:700px}
th{font-size:10px;font-weight:600;color:var(--muted);text-align:left;
  padding:6px 8px;border-bottom:0.5px solid var(--border);white-space:nowrap;
  position:sticky;top:0;background:var(--card)}
td{padding:8px 8px;border-bottom:0.5px solid var(--border);white-space:nowrap}
td.g{color:var(--green)}td.r{color:var(--red)}td.muted{color:var(--muted)}
.del-btn{font-size:14px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0 4px}
.del-btn:active{color:var(--red)}
.empty{text-align:center;padding:40px 16px;color:var(--muted);font-size:14px}
.chart-wrap{position:relative;width:100%;height:220px;margin-top:4px}
.setting-row{display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:0.5px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-lbl{font-size:15px}
.setting-sub{font-size:12px;color:var(--muted);margin-top:2px}
.setting-input{width:90px;padding:6px 10px;font-size:15px;
  border-radius:8px;border:0.5px solid var(--border);
  background:var(--bg);color:var(--text);text-align:right}
.setting-select{padding:6px 10px;font-size:13px;max-width:200px;
  border-radius:8px;border:0.5px solid var(--border);
  background:var(--bg);color:var(--text);appearance:none;-webkit-appearance:none}
.sync-status{font-size:11px;color:var(--muted);text-align:center;padding:6px 0}
.sync-status.ok{color:var(--green)}
.sync-status.err{color:var(--red)}
/* Login overlay */
.login-overlay{position:fixed;inset:0;background:var(--bg);z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px}
.login-overlay h2{font-size:22px;font-weight:600;margin-bottom:8px}
.login-overlay p{font-size:14px;color:var(--muted);text-align:center;margin-bottom:32px}
.login-icon{margin-bottom:16px;display:flex;justify-content:center}
</style>
</head>
<body>

<!-- Login Overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-icon">
  <svg width="100" height="100" viewBox="0 0 100 100">
    <rect width="100" height="100" rx="24" fill="#0f1923"/>
    <circle cx="50" cy="50" r="38" fill="none" stroke="#1a2a3a" stroke-width="6"/>
    <circle cx="50" cy="50" r="38" fill="none" stroke="#1baf7a" stroke-width="6"
      stroke-dasharray="165 239" stroke-dashoffset="60" stroke-linecap="round"/>
    <circle cx="50" cy="50" r="26" fill="none" stroke="#152030" stroke-width="5"/>
    <circle cx="50" cy="50" r="26" fill="none" stroke="#2a78d6" stroke-width="5"
      stroke-dasharray="110 163" stroke-dashoffset="41" stroke-linecap="round"/>
    <text x="50" y="47" text-anchor="middle" font-size="14" font-weight="700" fill="white" font-family="-apple-system,sans-serif">減脂</text>
    <text x="50" y="61" text-anchor="middle" font-size="8" fill="#1baf7a" font-family="-apple-system,sans-serif">TRACKER</text>
  </svg>
</div>
  <h2>個人減脂追蹤器</h2>
  <p>登入後可在手機與電腦之間同步資料</p>
  <button class="btn btn-google" id="loginBtn" style="max-width:280px">
    <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
    使用 Google 帳號登入
  </button>
</div>

<div class="header">
  <h1>個人減脂追蹤器</h1>
  <p id="headerSub">載入中...</p>
</div>

<div class="tab-bar">
  <button class="tab-btn on" onclick="switchTab('home',this)">總覽</button>
  <button class="tab-btn" onclick="switchTab('input',this)">記錄</button>
  <button class="tab-btn" onclick="switchTab('table',this)">數據</button>
  <button class="tab-btn" onclick="switchTab('charts',this)">圖表</button>
  <button class="tab-btn" onclick="switchTab('settings',this)">設定</button>
</div>

<!-- HOME -->
<div id="page-home" class="page on">
  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-lbl">目前體重</div><div class="kpi-val" id="k1">—</div></div>
    <div class="kpi"><div class="kpi-lbl">目前已瘦</div><div class="kpi-val g" id="k2">—</div></div>
    <div class="kpi"><div class="kpi-lbl">累計脂肪↓</div><div class="kpi-val g" id="k3">—</div></div>
    <div class="kpi"><div class="kpi-lbl">期間總赤字</div><div class="kpi-val" id="k4">—</div></div>
    <div class="kpi"><div class="kpi-lbl">每日平均赤字</div><div class="kpi-val" id="k6">—</div></div>
    <div class="kpi"><div class="kpi-lbl">平均每週脂肪↓</div><div class="kpi-val g" id="k7">—</div></div>
  </div>
  <div id="syncStatus" class="sync-status"></div>
  <div class="card">
    <div class="card-title">體重趨勢</div>
    <div class="chart-wrap"><canvas id="homeChart" role="img" aria-label="體重趨勢"></canvas></div>
  </div>
</div>

<!-- INPUT -->
<div id="page-input" class="page">
  <div class="card">
    <div class="card-title">新增 / 更新記錄</div>
    <div class="form-group">
      <label>日期 <span style="color:var(--accent)">*</span></label>
      <input type="date" id="iDate"/>
    </div>
    <div class="form-group">
      <label>體重 (kg) — 選填</label>
      <input type="number" id="iWeight" step="0.1" placeholder="留空則不更新" inputmode="decimal" oninput="updatePreview()"/>
      <div class="tdee-preview" id="tdeePreview"></div>
    </div>
    <div class="form-group">
      <label>攝取熱量 (kcal) — 選填</label>
      <input type="number" id="iCal" placeholder="留空則不更新" inputmode="numeric"/>
    </div>
    <div class="hint-text" style="margin-bottom:14px">日期必填，體重與熱量各自選填，填哪格就更新哪格</div>
    <button class="btn btn-primary" id="saveBtn" onclick="addRec()">更新記錄</button>
    <button class="btn btn-danger" onclick="clearAll()">清除全部資料</button>
  </div>
</div>

<!-- TABLE -->
<div id="page-table" class="page" style="padding:12px 8px">
  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th>日期</th><th>星期</th><th>體重</th><th>每週增減</th>
        <th>已瘦</th><th>攝取</th><th>TDEE</th><th>赤字</th>
        <th>脂肪↓/日</th><th>前日差</th><th>水分變化</th><th>累計脂肪↓</th><th></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="emptyMsg">尚無記錄，請先在「記錄」頁新增資料</div>
  </div>
</div>

<!-- CHARTS -->
<div id="page-charts" class="page">
  <div class="card">
    <div class="card-title">體重趨勢</div>
    <div class="chart-wrap"><canvas id="wChart" role="img" aria-label="體重趨勢"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">熱量（攝取 vs TDEE）</div>
    <div class="chart-wrap"><canvas id="cChart" role="img" aria-label="熱量趨勢"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">累計脂肪下降</div>
    <div class="chart-wrap"><canvas id="fChart" role="img" aria-label="累計脂肪"></canvas></div>
  </div>
</div>

<!-- SETTINGS -->
<div id="page-settings" class="page">
  <div class="card">
    <div class="card-title">帳號</div>
    <div class="setting-row">
      <div><div class="setting-lbl" id="userName">未登入</div><div class="setting-sub" id="userEmail"></div></div>
      <button onclick="logout()" style="font-size:13px;padding:6px 12px;border-radius:8px;border:0.5px solid var(--border);background:transparent;color:var(--red);cursor:pointer">登出</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">個人資料</div>
    <div class="setting-row">
      <div><div class="setting-lbl">身高</div><div class="setting-sub">cm</div></div>
      <input class="setting-input" type="number" id="sHeight" value="177" oninput="saveSetting()"/>
    </div>
    <div class="setting-row">
      <div><div class="setting-lbl">年齡</div><div class="setting-sub">歲</div></div>
      <input class="setting-input" type="number" id="sAge" value="36" oninput="saveSetting()"/>
    </div>
    <div class="setting-row">
      <div><div class="setting-lbl">性別</div><div class="setting-sub">影響 TDEE 基礎值</div></div>
      <select class="setting-select" id="sSex" onchange="saveSetting()">
        <option value="5">男</option>
        <option value="-161">女</option>
      </select>
    </div>
    <div class="setting-row">
      <div><div class="setting-lbl">活動係數</div><div class="setting-sub">依日常活動量</div></div>
      <select class="setting-select" id="sAct" onchange="saveSetting()">
        <option value="1.2">1.2 完全久坐 — 辦公室久坐，幾乎沒運動</option>
        <option value="1.375">1.375 輕度活動 — 偶爾健走、輕度健身（每週1–3天）</option>
        <option value="1.55">1.55 中度活動 — 規律健身、工作中有走動（每週3–5天）</option>
        <option value="1.725">1.725 高度活動 — 高強度訓練者、勞力工作（每週6–7天）</option>
        <option value="1.9">1.9 極高活動 — 全職運動員、重勞動</option>
      </select>
    </div>
    <div class="setting-row">
      <div><div class="setting-lbl">脂肪熱量</div><div class="setting-sub">kcal/kg，預設 7700</div></div>
      <input class="setting-input" type="number" id="sFat" value="7700" oninput="saveSetting()"/>
    </div>
  </div>
  <div class="card">
    <div class="card-title">TDEE 公式</div>
    <div style="font-size:13px;color:var(--secondary);line-height:1.7" id="formulaInfo"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, deleteDoc, collection, query, orderBy, onSnapshot, writeBatch } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD0ituv9D4mmnih53MApRSG5gS67TbxoV8",
  authDomain: "fat-tracker-c8ba2.firebaseapp.com",
  projectId: "fat-tracker-c8ba2",
  storageBucket: "fat-tracker-c8ba2.firebasestorage.app",
  messagingSenderId: "845992264329",
  appId: "1:845992264329:web:b91e717644060abcdf7c58"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const DAY=['日','一','二','三','四','五','六'];
let recs=[];
let currentUser=null;
let unsubscribe=null;
let homeChartInst=null,wChartInst=null,cChartInst=null,fChartInst=null;

// Auth
document.getElementById('loginBtn').onclick = async () => {
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  } catch(e) { alert('登入失敗：'+e.message); }
};

window.logout = async () => {
  if(confirm('確定登出？')) { await signOut(auth); }
};

onAuthStateChanged(auth, user => {
  currentUser = user;
  if(user) {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('userName').textContent = user.displayName || '使用者';
    document.getElementById('userEmail').textContent = user.email;
    document.getElementById('headerSub').textContent = user.displayName;
    loadSettings();
    subscribeRecords();
  } else {
    document.getElementById('loginOverlay').style.display = 'flex';
    if(unsubscribe) { unsubscribe(); unsubscribe=null; }
    recs = [];
  }
});

function userPath() {
  return `users/${currentUser.uid}`;
}

// Settings
function getSetting(){
  return{
    height:parseFloat(document.getElementById('sHeight').value)||177,
    age:parseFloat(document.getElementById('sAge').value)||36,
    sex:parseFloat(document.getElementById('sSex').value)||5,
    act:parseFloat(document.getElementById('sAct').value)||1.2,
    fatKcal:parseFloat(document.getElementById('sFat').value)||7700
  };
}

function calcTDEE(w){
  const s=getSetting();
  if(!w)return null;
  return (10*w+6.25*s.height-5*s.age+s.sex)*s.act;
}

window.saveSetting = async () => {
  if(!currentUser)return;
  const s=getSetting();
  try {
    await setDoc(doc(db, userPath(), 'settings'), s);
  } catch(e){}
  updatePreview();updateFormulaInfo();render();
};

async function loadSettings(){
  if(!currentUser)return;
  try {
    const snap = await getDoc(doc(db, userPath(), 'settings'));
    if(snap.exists()){
      const s=snap.data();
      if(s.height)document.getElementById('sHeight').value=s.height;
      if(s.age)document.getElementById('sAge').value=s.age;
      if(s.sex!==undefined)document.getElementById('sSex').value=s.sex;
      if(s.act)document.getElementById('sAct').value=s.act;
      if(s.fatKcal)document.getElementById('sFat').value=s.fatKcal;
    }
  } catch(e){}
  updatePreview();updateFormulaInfo();
}

function updateFormulaInfo(){
  const s=getSetting();
  const sample=calcTDEE(70);
  document.getElementById('formulaInfo').innerHTML=
    `(10 × 體重 + 6.25 × ${s.height} − 5 × ${s.age} + ${s.sex}) × ${s.act}<br><br>`+
    `<span style="color:var(--muted)">範例（70 kg）：${sample?Math.round(sample):'-'} kcal</span>`;
}

window.updatePreview = () => {
  const w=parseFloat(document.getElementById('iWeight').value);
  const tdee=w?calcTDEE(w):null;
  document.getElementById('tdeePreview').textContent=tdee?'此體重 TDEE = '+Math.round(tdee)+' kcal':'';
};

// Records - realtime sync
function subscribeRecords(){
  if(!currentUser)return;
  const q = query(collection(db, userPath(), 'records'), orderBy('date','asc'));
  unsubscribe = onSnapshot(q, snap => {
    recs = snap.docs.map(d=>d.data());
    setSyncStatus('已同步','ok');
    render();
  }, err => {
    setSyncStatus('同步失敗','err');
  });
}

function setSyncStatus(msg, type){
  const el=document.getElementById('syncStatus');
  el.textContent=msg;
  el.className='sync-status '+(type||'');
  if(type==='ok') setTimeout(()=>el.textContent='',3000);
}

window.addRec = async () => {
  if(!currentUser)return;
  const date=document.getElementById('iDate').value;
  if(!date){alert('請填入日期');return;}
  const wRaw=document.getElementById('iWeight').value;
  const calRaw=document.getElementById('iCal').value;
  const hasW=wRaw!=='';
  const hasCal=calRaw!=='';
  if(!hasW&&!hasCal){alert('體重或攝取熱量至少填一項');return;}

  const existing=recs.find(r=>r.date===date)||{};
  const obj={
    date,
    w: hasW ? parseFloat(wRaw) : (existing.w||null),
    cal: hasCal ? parseFloat(calRaw) : (existing.cal||null)
  };

  try {
    setSyncStatus('儲存中...','');
    await setDoc(doc(db, userPath(), 'records', date), obj);
    document.getElementById('iWeight').value='';
    document.getElementById('iCal').value='';
    document.getElementById('tdeePreview').textContent='';
    const btn=document.getElementById('saveBtn');
    btn.textContent='已儲存 ✓';
    setTimeout(()=>btn.textContent='更新記錄',1500);
  } catch(e){ alert('儲存失敗：'+e.message); }
};

window.delRec = async (date) => {
  if(!confirm('刪除這筆記錄？'))return;
  try {
    await deleteDoc(doc(db, userPath(), 'records', date));
  } catch(e){ alert('刪除失敗'); }
};

window.clearAll = async () => {
  if(!confirm('確定清除所有資料？這個動作無法復原'))return;
  try {
    const batch = writeBatch(db);
    recs.forEach(r => batch.delete(doc(db, userPath(), 'records', r.date)));
    await batch.commit();
  } catch(e){ alert('清除失敗'); }
};

function compute(){
  const s=getSetting();
  const base0=recs.find(r=>r.w!=null)?.w||null;
  let cumFat=0,cumDef=0,defDays=0;
  return recs.map((r,i)=>{
    const prevW=recs.slice(0,i).reverse().find(x=>x.w!=null);
    const tdee=r.w?calcTDEE(r.w):null;
    const wDiff=(r.w!=null&&prevW)?+(r.w-prevW.w).toFixed(2):null;
    const deficit=(r.cal!=null&&tdee!=null)?tdee-r.cal:null;
    const fatDay=deficit!=null?deficit/s.fatKcal:null;
    const waterChg=(wDiff!=null&&fatDay!=null)?+(wDiff-(-fatDay)).toFixed(4):null;
    if(fatDay!=null)cumFat+=fatDay;
    if(deficit!=null){cumDef+=deficit;defDays++;}
    const slim=(base0!=null&&r.w!=null)?+(base0-r.w).toFixed(2):null;
    const d=new Date(r.date+'T00:00:00');
    const dow=d.getDay();
    let weeklyWeight=null;
    if(dow===1&&i>0){
      const pm=recs.slice(0,i).reverse().find(x=>new Date(x.date+'T00:00:00').getDay()===1&&x.w!=null);
      if(pm&&r.w!=null)weeklyWeight=+(r.w-pm.w).toFixed(2);
    }
    return{date:r.date,dow,w:r.w,slim,wDiff,cal:r.cal,tdee,deficit,
      fatDay:fatDay!=null?+fatDay.toFixed(4):null,
      waterChg,cumFat:+cumFat.toFixed(4),
      cumDef:+cumDef.toFixed(0),defDays,weeklyWeight};
  });
}

function render(){
  const rows=compute();
  const tbody=document.getElementById('tbody');
  document.getElementById('emptyMsg').style.display=rows.length?'none':'block';
  tbody.innerHTML='';
  [...rows].reverse().forEach((r)=>{
    const tr=document.createElement('tr');
    const wd=r.wDiff!=null?(r.wDiff>0?'+':'')+r.wDiff.toFixed(2):'—';
    const wdC=r.wDiff==null?'':(r.wDiff<0?'g':'r');
    const defStr=r.deficit!=null?Math.round(r.deficit).toLocaleString():'—';
    const defC=r.deficit==null?'':(r.deficit>0?'g':'r');
    const ww=r.weeklyWeight!=null?(r.weeklyWeight<0?r.weeklyWeight.toFixed(2):'▲'+r.weeklyWeight.toFixed(2)):'';
    const wwC=r.weeklyWeight!=null?(r.weeklyWeight<0?'g':'r'):'';
    tr.innerHTML=`
      <td>${r.date.slice(5)}</td><td>星期${DAY[r.dow]}</td>
      <td>${r.w!=null?r.w.toFixed(1):'—'}</td>
      <td class="${wwC}">${ww}</td>
      <td class="g">${r.slim!=null&&r.slim>0?'-'+r.slim.toFixed(2):'—'}</td>
      <td>${r.cal!=null?Math.round(r.cal).toLocaleString():'—'}</td>
      <td class="muted">${r.tdee!=null?Math.round(r.tdee):'—'}</td>
      <td class="${defC}">${defStr}</td>
      <td class="${r.fatDay!=null&&r.fatDay>0?'g':''}">${r.fatDay!=null?r.fatDay.toFixed(4):'—'}</td>
      <td class="${wdC}">${wd}</td>
      <td>${r.waterChg!=null?r.waterChg.toFixed(4):'—'}</td>
      <td class="g">${r.cumFat>0?r.cumFat.toFixed(3):'—'}</td>
      <td><button class="del-btn" onclick="delRec('${r.date}')">✕</button></td>
    `;
    tbody.appendChild(tr);
  });
  if(rows.length){
    const last=rows[rows.length-1];
    const lastW=rows.slice().reverse().find(r=>r.w!=null);
    const base=recs.find(r=>r.w!=null)?.w;
    document.getElementById('k1').textContent=lastW?lastW.w.toFixed(1)+' kg':'—';
    document.getElementById('k2').textContent=(base&&lastW&&base!==lastW.w)?'-'+(base-lastW.w).toFixed(2)+' kg':'—';
    document.getElementById('k3').textContent=last.cumFat>0?'-'+last.cumFat.toFixed(3)+' kg':'—';
    document.getElementById('k4').textContent=last.cumDef?last.cumDef.toLocaleString()+' kcal':'—';
    const avg=last.defDays>0?last.cumDef/last.defDays:null;
    document.getElementById('k6').textContent=avg?Math.round(avg).toLocaleString()+' kcal':'—';
    const weeks=rows.length/7;
    document.getElementById('k7').textContent=(weeks>0&&last.cumFat>0)?'-'+(last.cumFat/weeks).toFixed(3)+' kg/週':'—';
    document.getElementById('headerSub').textContent=(currentUser?.displayName||'')+(lastW?' ｜ '+lastW.w.toFixed(1)+' kg':'');
  }
  updateCharts(rows);
}

function mkLine(ctx,labels,datasets){
  return new Chart(ctx,{type:'line',data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:datasets.length>1,labels:{font:{size:11},boxWidth:10,padding:12}}},
    scales:{
      x:{ticks:{color:'#898781',font:{size:10},maxTicksLimit:10},grid:{color:'rgba(128,128,128,0.08)'}},
      y:{ticks:{color:'#898781',font:{size:10}},grid:{color:'rgba(128,128,128,0.08)'}}
    }
  }});
}

function updateCharts(rows){
  [homeChartInst,wChartInst,cChartInst,fChartInst].forEach(c=>{if(c)c.destroy();});
  const lbl=rows.map(r=>r.date.slice(5));
  const wData=rows.map(r=>r.w);
  homeChartInst=mkLine(document.getElementById('homeChart').getContext('2d'),lbl,[
    {label:'體重',data:wData,borderColor:'#2a78d6',backgroundColor:'rgba(42,120,214,0.08)',borderWidth:2,pointRadius:2,fill:true,tension:0.3,spanGaps:true}]);
  wChartInst=mkLine(document.getElementById('wChart').getContext('2d'),lbl,[
    {label:'體重',data:wData,borderColor:'#2a78d6',backgroundColor:'rgba(42,120,214,0.08)',borderWidth:2,pointRadius:3,fill:true,tension:0.3,spanGaps:true}]);
  cChartInst=mkLine(document.getElementById('cChart').getContext('2d'),lbl,[
    {label:'攝取',data:rows.map(r=>r.cal),borderColor:'#1baf7a',borderWidth:2,pointRadius:3,fill:false,tension:0.3,spanGaps:true},
    {label:'TDEE',data:rows.map(r=>r.tdee?Math.round(r.tdee):null),borderColor:'#e34948',borderWidth:2,pointRadius:3,fill:false,tension:0.3,borderDash:[5,3],spanGaps:true}
  ]);
  fChartInst=mkLine(document.getElementById('fChart').getContext('2d'),lbl,[
    {label:'累計脂肪↓',data:rows.map(r=>r.cumFat>0?+r.cumFat.toFixed(3):null),borderColor:'#eda100',backgroundColor:'rgba(237,161,0,0.08)',borderWidth:2,pointRadius:3,fill:true,tension:0.3,spanGaps:true}]);
}

window.switchTab = (name,btn) => {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+name).classList.add('on');
  btn.classList.add('on');
};

document.getElementById('iDate').value=new Date().toISOString().slice(0,10);
updateFormulaInfo();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
